services:
  ansible-control:
    build: ./control
    container_name: ansible-control
    hostname: ansible-control
    networks:
      - ansible-net
    volumes:
      - ./ansible:/ansible
    tty: true
    stdin_open: true

  node1:
    build: ./node
    container_name: node1
    hostname: node1
    networks:
      - ansible-net
    tty: true
    stdin_open: true

  node2:
    build: ./node
    container_name: node2
    hostname: node2
    networks:
      - ansible-net
    tty: true
    stdin_open: true

  node3:
    build: ./node
    container_name: node3
    hostname: node3
    networks:
      - ansible-net
    tty: true
    stdin_open: true

networks:
  ansible-net:
    driver: bridge